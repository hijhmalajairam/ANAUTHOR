<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register - AnyAuthor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* THE GROK / CYBERPUNK AESTHETIC - CONSISTENT WITH LOGIN */
        body, html {
            height: 100%;
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        .split-layout {
            display: flex;
            min-height: 100vh;
        }

        /* --- ANIMATIONS --- */
        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.3; filter: blur(40px); }
            50% { transform: scale(1.1); opacity: 0.6; filter: blur(50px); }
            100% { transform: scale(1); opacity: 0.3; filter: blur(40px); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LEFT SIDE: The Roman Writer Lore */
        .left-panel {
            flex: 1;
            /* Subtle shift to a deep purple/indigo glow to represent ink and royalty */
            background: radial-gradient(circle at bottom left, #1e112a, #000000 60%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5rem;
            position: relative;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 20%; left: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulseGlow 7s ease-in-out infinite; 
        }

        .left-content {
            z-index: 1;
            animation: slideUpFade 0.8s ease-out forwards;
        }

        .brand-title {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-pillar {
            display: inline-block;
            animation: float 4s ease-in-out infinite;
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* RIGHT SIDE: The Form */
        .right-panel {
            flex: 1;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            opacity: 0;
            animation: slideUpFade 0.8s ease-out 0.2s forwards; 
        }

        .path-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .custom-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 8px;
            padding: 14px 16px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .custom-input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #a855f7; /* Purple highlight */
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
            color: #ffffff;
            outline: none;
        }

        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #0a0a0a inset !important;
            -webkit-text-fill-color: white !important;
        }

        .custom-label {
            color: #9ca3af;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        .btn-glow {
            background: #ffffff;
            color: #000000;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn-glow:hover {
            background: #f3e8ff;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
            transform: translateY(-1px);
        }

        .auth-link {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: inline-block;
            margin-top: 1.5rem;
        }

        .auth-link:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* Mobile Responsiveness */
        @media (max-width: 992px) {
            .split-layout {
                flex-direction: column;
            }
            .left-panel {
                padding: 4rem 2rem;
                text-align: center;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
        }
    </style>
</head>
<body>

<div class="split-layout">
    <div class="left-panel">
        <div class="left-content">
            <span class="icon-pillar">🏛️</span>
            <h1 class="brand-title">Forge Your Legacy.</h1>
            <p class="fs-4 text-secondary mb-4" style="max-width: 420px;">
                Empires fall. Words remain. Establish your permanent alias on the unfiltered network.
            </p>
        </div>
    </div>

    <div class="right-panel">
        <div class="login-box">
            <h2 class="path-title">Claim Pen Name 🖋️</h2>
            <p class="text-secondary mb-5">Register your identity in the grid.</p>

            <form action="/register" method="POST">
                <div class="mb-4">
                    <label class="custom-label">Alias / Username</label>
                    <input type="text" class="custom-input" name="username" required autocomplete="off">
                </div>
                
                <div class="mb-4">
                    <label class="custom-label">Secure Comm-Link (Email)</label>
                    <input type="email" class="custom-input" name="email" required autocomplete="off">
                </div>

                <div class="mb-4">
                    <label class="custom-label">Passphrase</label>
                    <input type="password" class="custom-input" name="password" required>
                </div>
                
                <button type="submit" class="btn-glow">Establish Identity</button>
            </form>

            <div class="text-center">
                <a href="/login" class="auth-link">Already an author? Initialize connection here.</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
