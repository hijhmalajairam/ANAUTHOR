<!DOCTYPE html>
<html lang="en">
<head>
    <title>Gateway - AnyAuthor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* THE GROK / CYBERPUNK AESTHETIC */
        body, html {
            height: 100%;
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        .split-layout {
            display: flex;
            min-height: 100vh;
        }

        /* --- ANIMATIONS --- */
        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.5; filter: blur(40px); }
            50% { transform: scale(1.1); opacity: 0.8; filter: blur(50px); }
            100% { transform: scale(1); opacity: 0.5; filter: blur(40px); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LEFT SIDE: The Ghost Path */
        .left-panel {
            flex: 1;
            background: radial-gradient(circle at top left, #111827, #000000 60%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5rem;
            position: relative;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: -10%; left: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            /* Added the breathing glow animation here */
            animation: pulseGlow 6s ease-in-out infinite; 
        }

        .left-content {
            z-index: 1;
            animation: slideUpFade 0.8s ease-out forwards;
        }

        .brand-title {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-ghost {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            backdrop-filter: blur(10px);
            margin-top: 1rem;
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #38bdf8;
            color: #38bdf8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.1);
        }

        /* Added the floating animation to the ghost emoji */
        .ghost-icon {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            margin-left: 12px;
            margin-right: 12px;
            font-size: 1.3rem;
        }

        /* RIGHT SIDE: The Author Path */
        .right-panel {
            flex: 1;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            /* Added smooth slide-in for the form */
            opacity: 0;
            animation: slideUpFade 0.8s ease-out 0.2s forwards; 
        }

        .path-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .custom-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 8px;
            padding: 14px 16px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .custom-input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
            color: #ffffff;
            outline: none;
        }

        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #0a0a0a inset !important;
            -webkit-text-fill-color: white !important;
        }

        .custom-label {
            color: #9ca3af;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        .btn-glow {
            background: #ffffff;
            color: #000000;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn-glow:hover {
            background: #e2e8f0;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .auth-link {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: inline-block;
            margin-top: 1.5rem;
        }

        .auth-link:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* Mobile Responsiveness */
        @media (max-width: 992px) {
            .split-layout {
                flex-direction: column;
            }
            .left-panel {
                padding: 4rem 2rem;
                text-align: center;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
        }
    </style>
</head>
<body>

<div class="split-layout">
    <div class="left-panel">
        <div class="left-content">
            <h1 class="brand-title">AnyAuthor.</h1>
            <p class="fs-4 text-secondary mb-4" style="max-width: 400px;">
                The unfiltered global network. Enter the grid without leaving a trace.
            </p>
            
            <a href="/feed" class="btn-ghost">
                Browse as Anonymous <span class="ghost-icon">👻</span> 
                <span>→</span>
            </a>
        </div>
    </div>

    <div class="right-panel">
        <div class="login-box">
            <h2 class="path-title">Enter as Author 🖋️</h2>
            <p class="text-secondary mb-5">Initialize secure connection to your verified alias.</p>

            <form action="/login" method="POST">
                <div class="mb-4">
                    <label class="custom-label">Alias / Username</label>
                    <input type="text" class="custom-input" name="username" required autocomplete="new-password">
                </div>
                
                <div class="mb-4">
                    <label class="custom-label">Passphrase</label>
                    <input type="password" class="custom-input" name="password" required autocomplete="new-password">
                </div>
                
                <button type="submit" class="btn-glow">Access Verified Profile</button>
            </form>

            <div class="text-center">
                <a href="/register" class="auth-link">Don't have an alias? Claim your pen name here.</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
